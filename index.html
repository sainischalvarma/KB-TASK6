<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Travel Photography Portfolio</h1>
        <p>Explore the world through my lens</p>
    </header>

    <div class="gallery-container">
        <!-- Image 1 -->
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=600&q=80" alt="Mountain Landscape">
            <div class="overlay">Mountain View</div>
        </div>
        <!-- Image 2 -->
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=600&q=80" alt="Serene Lake">
            <div class="overlay">Serene Lake</div>
        </div>
        <!-- Image 3 -->
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=600&q=80" alt="Forest Path">
            <div class="overlay">Deep Forest</div>
        </div>
        <!-- Image 4 -->
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=600&q=80" alt="Ocean Sunset">
            <div class="overlay">Ocean Breeze</div>
        </div>
        <!-- Image 5 -->
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=600&q=80" alt="Rolling Hills">
            <div class="overlay">Green Valleys</div>
        </div>
        <!-- Image 6 -->
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=600&q=80" alt="Snowy Peaks">
            <div class="overlay">Snowy Peaks</div>
        </div>
    </div>

</body>
</html>
